version: 2
project_name: openydt-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: openydt
    main: .
    binary: openydt
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/xiaowen-0725/openydt-cli/internal/cmdutil.Version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: openydt
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: xiaowen-0725
    name: openydt-cli
